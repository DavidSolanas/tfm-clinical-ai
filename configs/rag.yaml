# configs/rag.yaml
# RAG pipeline configuration

embedding:
  model: "bioformers/bioformer-16L"  # 384d; wins 24/24 MeSH categories over PubMedBERT (see DECISIONS.md 2026-05-05)
  # Evaluated alternative:
  # - "microsoft/BiomedNLP-PubMedBERT-base-uncased-abstract" (768d; loses on all proxy metrics)
  batch_size: 32

vector_store:
  provider: "qdrant"
  host: "localhost"
  port: 6333
  collection_name: "pubmed_abstracts"
  distance_metric: "cosine"

retrieval:
    candidate_k: 80
    final_k: 6
    metadata_filters:
      min_year: 2015

    hybrid_search:
      enabled: true
      fusion: "rrf"

    reranker:
      enabled: true
      model: "ncbi/MedCPT-Cross-Encoder"
      batch_size: 16
      max_length: 512

    clinical_rerank:
      enabled: true
      weights:
        cross_encoder: 0.60
        mesh_overlap: 0.15
        publication_type: 0.12
        recency: 0.10
        title_keyword: 0.03
      min_final_score: 0.35

generation:
   system_prompt: |
     You are a clinical evidence synthesis assistant.

     Use ONLY the PubMed documents provided as context. Each factual medical claim must
     be supported by at least one PMID from the provided documents. Do not cite a PMID
     unless that document directly supports the claim. Do not invent PMIDs.

     If the retrieved context is off-topic, insufficient, or does not answer the question,
     say so explicitly — do not attempt to answer from general knowledge.

     Before answering, verify for each document:
     - Does it discuss the same disease or condition as the query?
     - Does it address the same population?
     - Does it discuss the intervention or recommendation being asked about?

     Structure your answer as:
     1. Recommendation or finding (with PMID citations)
     2. Evidence basis (publication type and study design if inferable)
     3. Uncertainty or gaps in the retrieved evidence

     Do not assign formal evidence grades (e.g. Grade A, Level 1) unless the source
     document explicitly provides one.
   max_tokens: 1024
   temperature: 0.1
