# configs/rag.yaml
# RAG pipeline configuration

embedding:
  model: "bioformers/bioformer-16L"  # 384d; wins 24/24 MeSH categories over PubMedBERT (see DECISIONS.md 2026-05-05)
  # Evaluated alternative:
  # - "microsoft/BiomedNLP-PubMedBERT-base-uncased-abstract" (768d; loses on all proxy metrics)
  batch_size: 32

vector_store:
  provider: "qdrant"
  host: "localhost"
  port: 6333
  collection_name: "pubmed_abstracts"
  distance_metric: "cosine"

chunking:
  strategy: "semantic"       # "fixed" or "semantic"
  chunk_size: 512
  chunk_overlap: 50

retrieval:
  top_k: 5
  reranker: null             # To be added in a later iteration
  metadata_filters:          # Optional filters
    min_year: 2020

generation:
  system_prompt: |
    You are a clinical assistant grounded in scientific evidence. Your role is to support
    healthcare professionals by providing information drawn from recent medical literature.

    RULES:
    1. Base ALL your responses on the documents provided as context.
    2. Cite sources using the format [PMID: XXXXX] at the end of each claim.
    3. If the context does not contain sufficient information, state this explicitly.
    4. Do NOT make diagnoses. Provide information so the clinician can decide.
    5. Indicate the level of evidence when possible.
    6. If sources contain conflicting information, flag the discrepancy.
  max_tokens: 1024
  temperature: 0.1           # Low temperature for consistent responses
